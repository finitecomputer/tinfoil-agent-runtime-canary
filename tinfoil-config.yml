cvm-version: "0.7.5"
cpus: 4
memory: 16384

containers:
  - name: "finite-agent-tinfoil-user-canary"
    image: "ghcr.io/finitecomputer/finite-chat-hermes-runtime@sha256:e9c8e1d2827b97f6732d6c15e448678eefebfe56fab5088c6fd4d71f51b0512f"
    env:
      - FINITE_SERVER_URL: "https://chat.finite.computer"
      - FINITECHAT_SERVER_URL: "https://chat.finite.computer"
      - FINITECHAT_HOME: "/data/agent"
      - FINITE_AGENT_HTTP_PORT: "8080"
      - FINITECHAT_HERMES_INBOUND_STREAM: "1"
      - FINITECHAT_HERMES_MODEL: "anthropic/claude-sonnet-4.6"
      - FINITECHAT_HERMES_PROVIDER: "openrouter"
    secrets:
      - OPENROUTER_API_KEY
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      start_period: 5m
      retries: 10
    restart: always

shim:
  upstream-port: 8080
  paths:
    - /healthz
    - /invite
